<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>emexOS Release</title>

        <link rel="stylesheet" href="css/style.css" />
        <!-- Marked (Markdown parser) + DOMPurify (sanitize HTML) -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

        <script defer src="backend/release.js"></script>

        <style>
            /* README / Release styling */
            #releaseContent {
                font-family: "Poppins", sans-serif;
                font-size: 18px;
                line-height: 1.6;
                color: #111;
            }

            #releaseContent h1 {
                font-size: 36px;
                margin-bottom: 20px;
            }

            #releaseContent h2 {
                font-size: 28px;
                margin-top: 30px;
                margin-bottom: 15px;
            }

            #releaseContent h3 {
                font-size: 22px;
                margin-top: 25px;
            }

            #releaseContent p {
                margin-bottom: 16px;
            }

            #releaseContent ul {
                padding-left: 25px;
                margin-bottom: 20px;
            }

            #releaseContent li {
                margin-bottom: 8px;
            }

            #releaseContent a {
                color: #000;
                text-decoration: underline;
                font-weight: 500;
            }

            #releaseContent a:hover {
                text-decoration: none;
            }

            #releaseContent code {
                background: #f2f2f2;
                padding: 4px 6px;
                font-family: monospace;
                font-size: 16px;
            }

            #releaseContent pre {
                background: #f2f2f2;
                padding: 20px;
                overflow-x: auto;
                font-size: 16px;
            }

            #releaseContent img {
                max-width: 100%;
                display: block;
                margin: 20px auto;
            }
        </style>
    </head>

    <body
        class="parallaxTop"
        style="background-image: url(images/homeScreenBlurred.jpg)"
    >
        <div style="padding: 40px; max-width: 1200px; margin: 0 auto">
            <a class="ibackButton" href="index.html">&larr; Back</a>

            <div class="about1" style="margin-top: 20px">
                <h1 id="releaseTitle" class="aboutSubtitle">Loading...</h1>
                <div
                    id="releaseMeta"
                    style="margin-bottom: 16px; color: #666; font-size: 14px"
                ></div>
                <div id="releaseContent" style="padding-top: 10px"></div>
            </div>
        </div>
    </body>
</html>
